version: '3.8'

services:
  api-gateway:
    build:
      context: ../BookingAPI
    container_name: ApiGateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      hotel-service:
        condition: service_healthy
    ports:
      - "8080:8080"

  user-service:
    build:
      context: ../UsersMicroService
    container_name: users-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
      - ./keys/private.pem:/app/keys/private.pem:ro
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  user-db:
    image: postgres:16
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  media-service:
    build:
      context: ../MediaMicroService
    container_name: media-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      media-db:
        condition: service_healthy
      minio-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${MEDIA_SERVICE_DATABASE_URL}
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  media-db:
    image: postgres:16
    container_name: media-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MEDIA_DB_USER}
      POSTGRES_PASSWORD: ${MEDIA_DB_PASSWORD}
      POSTGRES_DB: ${MEDIA_DB_NAME}
    volumes:
      - media-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEDIA_DB_USER} -d ${MEDIA_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Auto-create the default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET:-media};
      mc anonymous set download local/${MINIO_BUCKET:-media};
      echo 'Bucket ready';
      "

  # HTTP wrapper service that exposes upload/download endpoints and holds MinIO creds
  minio-service:
    build:
      context: ../MinIOContainer
    container_name: minio-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  hotel-service:
    build:
      context: ../HotelMicroService
    container_name: hotel-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      hotel-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${HOTEL_SERVICE_DATABASE_URL}
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  hotel-db:
    image: postgres:16
    container_name: hotel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HOTEL_DB_USER}
      POSTGRES_PASSWORD: ${HOTEL_DB_PASSWORD}
      POSTGRES_DB: ${HOTEL_DB_NAME}
    volumes:
      - hotel-db-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HOTEL_DB_USER} -d ${HOTEL_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  user-db-data:
  media-db-data:
  hotel-db-data:
  minio_data:
