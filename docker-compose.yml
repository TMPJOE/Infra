services:
  api-gateway:
    build:
      context: ../BookingAPI
    container_name: ApiGateway
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      hotel-service:
        condition: service_healthy
      rooms-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      bff-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  user-service:
    build:
      context: ../UsersMicroService
    container_name: users-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
      - ./keys/private.pem:/app/keys/private.pem:ro
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  user-db:
    image: postgres:16
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  media-service:
    build:
      context: ../MediaMicroService
    container_name: media-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      media-db:
        condition: service_healthy
      minio-service:
        condition: service_healthy
    environment:
      DATABASE_URL: ${MEDIA_SERVICE_DATABASE_URL}
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  media-db:
    image: postgres:16
    container_name: media-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MEDIA_DB_USER}
      POSTGRES_PASSWORD: ${MEDIA_DB_PASSWORD}
      POSTGRES_DB: ${MEDIA_DB_NAME}
    volumes:
      - media-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEDIA_DB_USER} -d ${MEDIA_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET:-media};
      mc anonymous set download local/${MINIO_BUCKET:-media};
      echo 'Bucket ready';
      "

  minio-service:
    build:
      context: ../MinIOContainer
    container_name: minio-service
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  hotel-service:
    build:
      context: ../HotelMicroService
    container_name: hotel-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      hotel-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${HOTEL_SERVICE_DATABASE_URL}
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  hotel-db:
    image: postgres:16
    container_name: hotel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HOTEL_DB_USER}
      POSTGRES_PASSWORD: ${HOTEL_DB_PASSWORD}
      POSTGRES_DB: ${HOTEL_DB_NAME}
    volumes:
      - hotel-db-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HOTEL_DB_USER} -d ${HOTEL_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rooms-service:
    build:
      context: ../RoomsMicroService
    container_name: rooms-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      rooms-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${ROOMS_SERVICE_DATABASE_URL}
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  rooms-db:
    image: postgres:16
    container_name: rooms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ROOMS_DB_USER}
      POSTGRES_PASSWORD: ${ROOMS_DB_PASSWORD}
      POSTGRES_DB: ${ROOMS_DB_NAME}
    volumes:
      - rooms-db-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ROOMS_DB_USER} -d ${ROOMS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  booking-service:
    build:
      context: ../BookingMicroService
    container_name: booking-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      booking-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${BOOKING_SERVICE_DATABASE_URL}
    ports:
      - "8086:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  booking-db:
    image: postgres:16
    container_name: booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BOOKING_DB_USER}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD}
      POSTGRES_DB: ${BOOKING_DB_NAME}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOOKING_DB_USER} -d ${BOOKING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bff-service:
    build:
      context: ../BackendForFrontend
    container_name: bff-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      user-service:
        condition: service_healthy
      hotel-service:
        condition: service_healthy
      rooms-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      HOTEL_SERVICE_URL: http://hotel-service:8080
      ROOM_SERVICE_URL: http://rooms-service:8080
      BOOKING_SERVICE_URL: http://booking-service:8080
      RESERVATION_SERVICE_URL: http://booking-service:8080
      MEDIA_SERVICE_URL: http://media-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
    ports:
      - "8087:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  payment-service:
    build:
      context: ../PaymentMicroService
    container_name: payment-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      payment-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${PAYMENT_SERVICE_DATABASE_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  payment-db:
    image: postgres:16
    container_name: payment-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
      POSTGRES_DB: ${PAYMENT_DB_NAME}
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  notification-service:
    build:
      context: ../NotificationsMicroService
    container_name: notification-service
    restart: unless-stopped
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    depends_on:
      mailpit:
        condition: service_healthy
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@hotel.com"
    ports:
      - "8089:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  user-db-data:
  media-db-data:
  hotel-db-data:
  rooms-db-data:
  booking-db-data:
  minio_data:
  payment-db-data:
